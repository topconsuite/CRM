<mat-tab-group class="tab-group" #tabGroup (selectedIndexChange)="onTabChange($event)">
  <ng-content></ng-content>
  
  <mat-tab *ngFor="let step of visibleWizardSteps" [disabled]="step.isDisabled()">
    <ng-template mat-tab-label>
      <span *ngIf="step.isValid" class="centralize">
        <mat-icon matTooltip="{{ step.title }}" style="color: green !important">{{ step.icon }}</mat-icon>
        <span class="step-title" style="color: green !important"> {{ step.title }} </span>
        <mat-icon *ngIf="step.isValid" style="color: green !important">check</mat-icon>
      </span>
      <span *ngIf="!step.isValid && step.isDisabled()" class="centralize">
        <mat-icon matTooltip="{{ step.title }}">{{ step.icon }}</mat-icon>
        <span class="step-title"> {{ step.title }} </span>
      </span>
      <span *ngIf="!step.isValid && !step.isDisabled()" class="centralize">
        <mat-icon matTooltip="{{ step.title }}" style="color: #039be5 !important">{{ step.icon }}</mat-icon>
        <span class="step-title" style="color: #039be5 !important"> {{ step.title }} </span>
      </span>
    </ng-template>
    <div class="content p-24" [style.height]="containerHeight()" fusePerfectScrollbar>
      <ng-container *ngTemplateOutlet="step.container;context:step"></ng-container>
    </div>
    
  </mat-tab>
</mat-tab-group>

<div *ngIf="selectecStep">
  <span style="display: inline-block; width: 33%; text-align: left;">
    <button mat-button [disabled]="selectecStep.isDisabled()" (click)="selectecStep.previous()"
      *ngIf="selectecStep.hasPreviousButton && !selectecStep.isFirst"><mat-icon>navigate_before</mat-icon>ANTERIOR</button>
  </span>
  <span style="display: inline-block; width: 66%; text-align: right;">
    <button mat-button [disabled]="!selectecStep.isValid" (click)="selectecStep.next()"
      *ngIf="selectecStep.hasNextButton && !selectecStep.isLast">PRÓXIMO<mat-icon>navigate_next</mat-icon></button>
    <button mat-button color="accent" [disabled]="!getLast().isValid || tryCompleteWizzard"
      (click)="selectecStep.complete()">CONCLUIR <mat-icon>done_all</mat-icon></button>
  </span>
</div>
