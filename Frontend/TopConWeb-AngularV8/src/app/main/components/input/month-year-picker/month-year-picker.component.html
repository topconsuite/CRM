<div [formGroup]="formGroup" class="form-container">
  <mat-form-field class="input-full-width">
    <input matInput
           [matDatepicker]="picker"
           [placeholder]="placeholder"
           formControlName="{{name}}"
           [(ngModel)]="convertedModel"
           [required]="required"
           (focus)="picker.open()"
           (dateInput)="setModel($event.value)">
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker
                    startView="multi-year"
                    (yearSelected)="yearSelected($event)"
                    (monthSelected)="monthSelected($event, picker)"
                    panelClass="month-year-picker">
    </mat-datepicker>
    <mat-error *ngIf="formControl?.hasError('required')">
      {{ requiredErrorMessage }}
    </mat-error>
    <mat-error *ngFor="let item of errorMessagesFiltered()">
      {{ item.message }}
    </mat-error>
  </mat-form-field>
</div>
