<simple-input [formGroup]="formGroup" [placeholder]="placeholder" [name]="name"
  [model]="model" (modelChange)="setModel($event)" [mask]="{mask: maskCPF}" [cpf]="true"
  [errorMessages]="[{key: 'cpf', message: 'cpf inválido!'}]" [validator]="validator"
  (focus)="onFocus()" (focusout)="onFocusout()" [required]="required" [disabled]="disabled"
  [noCase]="noCase" [upperCase]="upperCase" [lowerCase]="lowerCase"></simple-input>
